[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_PROJECT_ID,FIREBASE_PRIVATE_KEY,FIREBASE_CLIENT_EMAIL,GCP_AI_PRIVATE_KEY,GCP_AI_CLIENT_EMAIL,OPENAI_ADMIN_KEY,CLOUDCONVERT_API_KEY,NEXT_PUBLIC_FIREBASE_API_KEY,GCP_AI_BILLING_ACCOUNT_ID,FIREBASE_BILLING_ACCOUNT_ID,GOOGLE_CLOUD_BILLING_ACCOUNT_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"
